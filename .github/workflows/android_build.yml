name: Build UGX Travel Converter APK

on:
  push:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant permissions and Build
      run: |
        # If the project is inside a subfolder, move into it
        if [ -d "ugx_converter_pro_project" ]; then
          cd ugx_converter_pro_project
        elif [ -d "app.zip" ]; then
          unzip app.zip
        fi
        
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: UGX-Travel-Converter-Final
        path: "**/build/outputs/apk/debug/*.apk"
