name: Build UGX Travel Converter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

# Fix for the Node.js 24 deprecation warning seen in logs
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        elif [ -f "ugx_converter_pro_project/gradlew" ]; then
          chmod +x ugx_converter_pro_project/gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug || ./ugx_converter_pro_project/gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UGX-Travel-Converter-Debug
        # Using wildcards to find the APK wherever it was built
        path: "**/build/outputs/apk/debug/*.apk"
