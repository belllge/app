name: Build UGX Travel Converter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

# Fix for the Node.js 24 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # This step will try to generate the wrapper if it's missing
    - name: Ensure Gradle Wrapper exists
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UGX-Travel-Converter-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
